<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Red Squircle tilted slightly -->
  <g transform="translate(256, 256) rotate(8) translate(-256, -256)">
    <rect x="70" y="70" width="372" height="372" rx="100" fill="#cc0000" />
  </g>
  <!-- White Sword centered and rotated -->
  <g transform="translate(256, 256) rotate(45) translate(-256, -256)">
    <!-- Blade -->
    <path d="M230 140C230 130 240 100 256 100C272 100 282 130 282 140V280H230V140Z" fill="white"/>
    <!-- Guard -->
    <rect x="180" y="280" width="152" height="28" rx="14" fill="white"/>
    <!-- Hilt -->
    <rect x="238" y="308" width="36" height="45" rx="10" fill="white"/>
    <!-- Pommel -->
    <circle cx="256" cy="365" r="18" fill="white"/>
  </g>
</svg>

