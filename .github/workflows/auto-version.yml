name: Auto Version
on:
  push:
    branches:
      - main

jobs:
  get-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    uses: HalloftheGods/.github/.github/workflows/calculate-version.yml@main
    
  update-plugin:
    needs: get-version
    uses: HalloftheGods/.github/.github/workflows/wp-plugin-update.yml@main
    with:
      version_string: ${{ needs.get-version.outputs.version_string }}

  release-zip:
    needs: [get-version, update-plugin]
    uses: HalloftheGods/.github/.github/workflows/build-plugin-zip.yml@main
    with:
      plugin_slug: 'xophz-compass'
      version: ${{ needs.get-version.outputs.version_string }}
